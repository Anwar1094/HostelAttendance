<!DOCTYPE html>
<html>
<head>
  <title>Screen Size</title>
</head>
<body>
  <h2 id="output"></h2>

  <script>
    const width = screen.width;
    const height = screen.height;
    document.getElementById("output").textContent = `Your screen size is ${width} x ${height} pixels`;
  </script>
</body>
</html>
